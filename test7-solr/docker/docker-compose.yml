services:
  solr:
    image: solr:9
    container_name: test7-solr
    restart: unless-stopped
    ports:
      - "8983:8983"
    volumes:
      - solr_data:/var/solr
    command:
      - solr-precreate
      - exocortex
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8983/solr/exocortex/admin/ping?wt=json | grep -q '\"status\":\"OK\"'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

volumes:
  solr_data:
