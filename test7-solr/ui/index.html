<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>exocortex search</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>exocortex search</h1>
    <div class="status" id="status">…</div>
  </header>

  <section class="searchbar">
    <input id="q" type="search" placeholder="search your Claude Code history…  (leave blank for recent activity)" autocomplete="off" autofocus>
    <button id="go">Search</button>
    <button id="clear" class="secondary" title="Clear query + all filters">Reset</button>
  </section>

  <section class="toolbar">
    <div class="tool">
      <label>Date:</label>
      <div class="preset-group" id="date-presets">
        <button data-preset="all" class="active">All</button>
        <button data-preset="7d">7d</button>
        <button data-preset="30d">30d</button>
        <button data-preset="90d">90d</button>
        <button data-preset="custom">Custom…</button>
      </div>
      <div id="custom-dates" class="custom-dates hidden">
        <input type="date" id="date-from"> → <input type="date" id="date-to">
        <button id="apply-dates">Apply</button>
      </div>
    </div>

    <div class="tool">
      <label for="sort">Sort:</label>
      <select id="sort">
        <option value="relevance">Relevance</option>
        <option value="started_desc">Newest first</option>
        <option value="started_asc">Oldest first</option>
        <option value="turns_desc">Most turns</option>
        <option value="duration_desc">Longest duration</option>
        <option value="size_desc">Largest (KB)</option>
      </select>
    </div>

    <div class="tool">
      <label for="min-turns" title="1 message = 1 turn (user OR assistant)">Min turns:</label>
      <select id="min-turns" title="Total messages (user + assistant)">
        <option value="">any</option>
        <option value="1">1+</option>
        <option value="5">5+</option>
        <option value="10">10+</option>
        <option value="25">25+</option>
        <option value="50">50+</option>
        <option value="100">100+</option>
        <option value="250">250+</option>
      </select>
    </div>

    <div class="tool">
      <label for="min-duration">Min duration:</label>
      <select id="min-duration">
        <option value="">any</option>
        <option value="1">1 min</option>
        <option value="5">5 min</option>
        <option value="15">15 min</option>
        <option value="30">30 min</option>
        <option value="60">1 h</option>
        <option value="120">2 h</option>
        <option value="240">4 h</option>
      </select>
    </div>
  </section>

  <section id="chips" class="chips"></section>
  <div id="debug" class="debug"></div>

  <div id="didyoumean" class="didyoumean"></div>

  <main>
    <aside id="facets" class="facets"></aside>
    <section class="results-col">
      <div id="stats" class="stats-card hidden"></div>
      <div id="histogram" class="histogram hidden"></div>
      <section id="results" class="results">
        <div class="hint">Loading…</div>
      </section>
    </section>
  </main>

  <div id="modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-body">
      <button class="modal-close" data-close>×</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
