<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test 3 — Movie Search</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; padding: 20px; max-width: 960px; margin: 0 auto; }
        h1 { margin-bottom: 20px; font-size: 1.5rem; }

        .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
        .tab { padding: 8px 18px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 14px; }
        .tab.active { background: #059669; color: white; border-color: #059669; }

        .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
        .search-bar input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .search-bar select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: white; font-size: 14px; }

        .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filters select { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; background: white; }

        .movie-grid { display: flex; flex-direction: column; gap: 10px; }

        .movie-card { background: white; border-radius: 8px; padding: 16px; border: 1px solid #e5e5e5; cursor: pointer; }
        .movie-card:hover { border-color: #059669; }
        .movie-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .movie-title { font-weight: 600; font-size: 15px; }
        .movie-title mark { background: #d1fae5; padding: 0 2px; border-radius: 2px; }
        .movie-rating { background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 700; white-space: nowrap; }
        .movie-meta { font-size: 13px; color: #666; margin-bottom: 6px; }
        .movie-meta span { margin-right: 12px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge-genre { background: #ede9fe; color: #6d28d9; }
        .movie-synopsis { font-size: 13px; color: #555; line-height: 1.5; }
        .movie-synopsis mark { background: #d1fae5; padding: 0 2px; border-radius: 2px; }
        .movie-reviews { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
        .review-snippet { font-size: 12px; color: #777; font-style: italic; margin-bottom: 4px; }
        .review-snippet mark { background: #d1fae5; font-style: normal; }

        .movie-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
        .movie-detail.open { display: block; }
        .detail-section { margin-bottom: 8px; }
        .detail-section strong { font-size: 12px; color: #888; text-transform: uppercase; }
        .detail-section p { font-size: 14px; margin-top: 2px; line-height: 1.6; }

        .stats { text-align: center; color: #999; font-size: 13px; margin-bottom: 16px; }
        .empty { text-align: center; color: #999; padding: 40px; }
    </style>
</head>
<body>
    <h1>Movie Search</h1>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('browse')">Browse</div>
        <div class="tab" onclick="switchTab('search')">Search</div>
    </div>

    <!-- Browse view -->
    <div id="browse-view">
        <div class="filters">
            <select id="filter-genre" onchange="loadMovies()"><option value="">All Genres</option></select>
            <select id="filter-director" onchange="loadMovies()"><option value="">All Directors</option></select>
            <select id="filter-sort" onchange="loadMovies()">
                <option value="rating">Top Rated</option>
                <option value="year">Newest</option>
                <option value="title">A-Z</option>
            </select>
        </div>
        <div class="stats" id="browse-stats"></div>
        <div class="movie-grid" id="browse-list"></div>
    </div>

    <!-- Search view -->
    <div id="search-view" style="display:none">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search movies..." oninput="debounceSearch()">
            <select id="search-mode">
                <option value="title">Title / Cast / Synopsis</option>
                <option value="review">Reviews</option>
            </select>
        </div>
        <div class="stats" id="search-stats"></div>
        <div class="movie-grid" id="search-list"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
