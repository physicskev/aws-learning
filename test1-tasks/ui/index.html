<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test 1 — Task Manager</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; padding: 20px; max-width: 900px; margin: 0 auto; }
        h1 { margin-bottom: 20px; font-size: 1.5rem; }

        .add-form { display: flex; gap: 8px; margin-bottom: 20px; }
        .add-form input[type="text"] { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .add-form select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: white; }
        .add-form button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .add-form button:hover { background: #1d4ed8; }

        .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filters select, .filters input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; background: white; }
        .filters input { flex: 1; min-width: 150px; }

        .task-list { display: flex; flex-direction: column; gap: 8px; }

        .task-card { background: white; border-radius: 8px; padding: 14px 16px; border: 1px solid #e5e5e5; }
        .task-card:hover { border-color: #cbd5e1; }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .task-title { font-weight: 600; font-size: 15px; cursor: pointer; }
        .task-title:hover { color: #2563eb; }
        .task-meta { display: flex; gap: 8px; align-items: center; font-size: 12px; color: #888; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-in_progress { background: #dbeafe; color: #1e40af; }
        .badge-complete { background: #d1fae5; color: #065f46; }
        .badge-low { background: #f1f5f9; color: #64748b; }
        .badge-medium { background: #fff7ed; color: #c2410c; }
        .badge-high { background: #fee2e2; color: #991b1b; }

        .task-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
        .task-detail.open { display: block; }
        .detail-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .detail-row label { font-size: 13px; color: #666; width: 80px; }
        .detail-row input, .detail-row select, .detail-row textarea { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; font-family: inherit; }
        .detail-row textarea { min-height: 60px; resize: vertical; }
        .btn-delete { padding: 6px 14px; background: #ef4444; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 4px; }
        .btn-delete:hover { background: #dc2626; }

        .empty { text-align: center; color: #999; padding: 40px; }
    </style>
</head>
<body>
    <h1>Task Manager</h1>

    <div class="add-form">
        <input type="text" id="new-title" placeholder="New task title...">
        <select id="new-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
        </select>
        <button onclick="addTask()">Add Task</button>
    </div>

    <div class="filters">
        <select id="filter-status" onchange="loadTasks()">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="complete">Complete</option>
        </select>
        <select id="filter-priority" onchange="loadTasks()">
            <option value="">All Priorities</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>
        <input type="text" id="filter-search" placeholder="Search..." oninput="loadTasks()">
    </div>

    <div class="task-list" id="task-list"></div>

    <script src="app.js"></script>
</body>
</html>
